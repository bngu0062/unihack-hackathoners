<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PFA – Parking For All</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
body{margin:0;padding:0;font-family:sans-serif;}
#bar{position:fixed;top:0;left:0;right:0;height:50px;background:#1a1a2e;display:flex;align-items:center;gap:10px;padding:0 15px;z-index:9999;color:white;}
#bar h1{font-size:16px;margin:0;white-space:nowrap;}
#sinput{flex:1;max-width:260px;padding:6px 12px;border-radius:20px;border:none;font-size:13px;outline:none;}
#sbtn{padding:6px 14px;border-radius:20px;border:none;background:#2196f3;color:white;cursor:pointer;font-size:13px;font-weight:600;}
#toggle-btn{padding:6px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:white;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;transition:background .2s;}
#myloc-btn{padding:6px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.3);background:#43a047;color:white;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;transition:background .2s;flex-shrink:0;}
#myloc-btn:hover{background:#388e3c;}
#toggle-btn:hover{background:rgba(255,255,255,.2);}
#map{position:fixed;top:50px;left:0;height:calc(100vh - 50px);transition:width .3s;}
#map.full{width:100%;}
#map.split{width:calc(100% - 340px);}
#side{position:fixed;top:50px;right:0;width:340px;height:calc(100vh - 50px);background:white;border-left:1px solid #ccc;display:flex;flex-direction:column;overflow:hidden;transition:transform .3s;z-index:500;}
#side.hidden{transform:translateX(340px);}
#side-head{padding:10px 14px;background:#f5f5f5;border-bottom:1px solid #eee;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
#side-head h2{margin:0;font-size:14px;}
#cnt{color:#2196f3;font-size:12px;font-weight:700;}
#tree{flex-shrink:0;max-height:200px;overflow-y:auto;border-bottom:2px solid #e0e0e0;}
.tsec-hdr{display:flex;align-items:center;gap:6px;padding:6px 12px;cursor:pointer;font-size:12px;font-weight:700;background:#f5f5f5;border-bottom:1px solid #eee;user-select:none;}
.tsec-hdr:hover{background:#e3f2fd;}
.tsec-body{display:none;background:white;}
.tsec-body.open{display:block;}
.tcar{font-size:9px;display:inline-block;transition:transform .18s;color:#999;}
.tcar.open{transform:rotate(90deg);}
.tbg{margin-left:auto;background:#e0e0e0;color:#555;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700;}
.tcc-row{display:flex;align-items:center;gap:4px;padding:5px 12px 5px 24px;cursor:pointer;font-size:12px;font-weight:600;border-bottom:1px solid #f5f5f5;user-select:none;}
.tcc-row:hover{background:#e8f5e9;}
.tst-list{display:none;}.tst-list.open{display:block;}
.tst-row{display:flex;align-items:center;gap:4px;padding:4px 12px 4px 38px;cursor:pointer;font-size:11px;color:#555;border-left:3px solid transparent;user-select:none;}
.tst-row:hover{background:#fce4ec;border-left-color:#f48fb1;}
.tsub-list{display:none;}.tsub-list.open{display:block;}
.tsub-row{display:flex;align-items:center;gap:4px;padding:4px 12px 4px 52px;cursor:pointer;font-size:11px;color:#444;user-select:none;border-left:3px solid transparent;}
.tsub-row:hover{background:#fff8e1;border-left-color:#ffb300;}
.tsub-row.tsub-open{background:#fff3e0;color:#e65100;font-weight:700;border-left-color:#ff8f00;}
.tspot-list{display:none;}.tspot-list.open{display:block;}
.tspot-row{padding:5px 12px 5px 66px;cursor:pointer;font-size:11px;color:#1565c0;border-left:3px solid #bbdefb;user-select:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:#f8fbff;}
.tspot-row:hover{background:#e3f2fd;border-left-color:#1976d2;font-weight:700;color:#0d47a1;}
#list-hint{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#bbb;font-size:13px;text-align:center;padding:20px;gap:8px;}
#list{display:none;flex:1;overflow-y:auto;padding:8px;}
.card{border:1px solid #ddd;border-radius:10px;padding:10px;margin-bottom:8px;cursor:pointer;transition:border-color .2s;}
.card:hover{border-color:#2196f3;}
.card b{font-size:14px;display:block;margin-bottom:2px;}
.card small{color:#888;display:block;margin-bottom:4px;}
.card em{font-size:12px;color:#555;display:block;margin-bottom:8px;}
.tbar{background:#eee;border-radius:4px;height:6px;margin-bottom:3px;}
.tfill{height:100%;border-radius:4px;transition:width .4s;}
.tmsg{font-size:10px;font-weight:600;margin-bottom:8px;}
.vrow{display:flex;gap:6px;margin-bottom:6px;}
.vbtn{flex:1;padding:7px;border-radius:18px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid;}
.vyes{background:#e8f5e9;color:#2e7d32;border-color:#a5d6a7;}
.vno{background:#ffebee;color:#c62828;border-color:#ef9a9a;}
.vbtn:disabled{opacity:.4;cursor:not-allowed;}
.arow{display:flex;gap:6px;align-items:center;}
.abtn{padding:4px 10px;border-radius:14px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid;}
.aedit{background:#fff3e0;color:#e65100;border-color:#ffcc80;}
.adel{background:#fce4ec;color:#880e4f;border-color:#f48fb1;}
.card-highlight{border-color:#1976d2 !important;background:#e3f2fd !important;box-shadow:0 0 0 3px rgba(33,150,243,.3);}
#quick-add{display:none;padding:12px 14px;background:#fffde7;border-top:2px solid #fbc02d;flex-shrink:0;}
#qa-title{font-size:13px;font-weight:700;color:#f57f17;margin-bottom:6px;}
#qa-addr-display{font-size:12px;color:#333;background:#fff9c4;border:1px solid #f9a825;border-radius:8px;padding:8px 10px;margin-bottom:8px;line-height:1.5;}
#qa-notes{width:100%;border:1px solid #ccc;border-radius:8px;padding:8px 10px;font-size:13px;height:64px;resize:none;outline:none;background:white;margin-bottom:8px;transition:border-color .2s;box-sizing:border-box;}
#qa-notes:focus{border-color:#fbc02d;}
#qa-btns{display:flex;gap:8px;}
#qa-save{flex:1;background:#f9a825;color:white;border:none;border-radius:18px;padding:9px;font-size:13px;font-weight:700;cursor:pointer;}
#qa-save:hover{background:#f57f17;}
#qa-cancel{background:#eee;color:#555;border:none;border-radius:18px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;}
#qa-cancel:hover{background:#ddd;}
#add-overlay{display:none;position:fixed;top:50px;right:0;width:340px;height:calc(100vh - 50px);background:white;z-index:600;flex-direction:column;border-left:1px solid #ccc;}
#add-overlay.show{display:flex;}
#add-overlay-hdr{background:#1565c0;color:white;padding:13px 14px;font-size:13px;font-weight:700;display:flex;align-items:center;flex-shrink:0;}
#add-overlay-body{padding:14px;display:flex;flex-direction:column;gap:10px;flex:1;overflow-y:auto;}
#add-search-row{display:flex;gap:6px;}
#add-addr-box{display:none;background:#f0f7ff;border:1px solid #bbdefb;border-radius:8px;padding:10px 12px;font-size:12px;}
#add-desc{display:none;padding:9px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;resize:none;font-family:inherit;outline:none;min-height:80px;}
#add-save-btn{display:none;padding:13px;background:#43a047;color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;}
#add-save-btn:hover{background:#388e3c;}
#add-status{font-size:11px;color:#888;min-height:14px;}
.add-step-label{font-size:12px;font-weight:700;color:#333;}
#addspot-btn{padding:6px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.3);background:#1565c0;color:white;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;flex-shrink:0;}
#addspot-btn:hover,#addspot-btn.on{background:#0d47a1;}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.82);color:white;padding:9px 18px;border-radius:20px;font-size:13px;z-index:99999;opacity:0;transition:opacity .3s;pointer-events:none;max-width:90vw;text-align:center;}
#toast.on{opacity:1;}
#locbtn{position:fixed;bottom:24px;left:16px;z-index:9998;width:38px;height:38px;border-radius:50%;background:white;border:1px solid #ccc;font-size:18px;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.25);}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(33,150,243,.6);}70%{box-shadow:0 0 0 14px rgba(33,150,243,0);}100%{box-shadow:0 0 0 0 rgba(33,150,243,0);}}
@media(max-width:660px){
  #map.split{width:100%;height:45vh;top:50px;}
  #map.full{width:100%;height:calc(100vh - 50px);}
  #side{width:100%;height:55vh;top:auto;bottom:0;right:0;border-left:none;border-top:1px solid #ccc;}
  #side.hidden{transform:translateY(55vh);}
  #locbtn{bottom:calc(55vh + 10px);}
  #locbtn.sidebar-hidden{bottom:24px;}
  #add-overlay{width:100%;top:auto;bottom:0;height:70vh;border-left:none;border-top:2px solid #1565c0;}
}

#sync-indicator{position:fixed;bottom:20px;right:16px;z-index:9998;display:flex;align-items:center;gap:6px;background:white;border:1px solid #ddd;border-radius:20px;padding:5px 12px;font-size:11px;color:#888;box-shadow:0 2px 6px rgba(0,0,0,.15);transition:all .3s;pointer-events:none;}
#sync-indicator.syncing{border-color:#2196f3;color:#2196f3;background:#e3f2fd;}
#sync-indicator.synced{border-color:#43a047;color:#2e7d32;background:#e8f5e9;}
#sync-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0;}
#sync-indicator.syncing #sync-dot{animation:syncpulse .7s ease-in-out infinite alternate;}
@keyframes syncpulse{from{opacity:.3;}to{opacity:1;}}
#sync-ring{width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;flex-shrink:0;display:none;}
#sync-indicator.syncing #sync-ring{display:block;animation:spin .7s linear infinite;}
#sync-indicator.syncing #sync-dot{display:none;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div id="bar">
  <h1>🅿️ PFA <span style="font-size:10px;opacity:.6;font-weight:400">Parking For All</span></h1>
  <input id="sinput" placeholder="Search a location…"/>
  <button id="sbtn">🔍 Search</button>
  <button id="myloc-btn" onclick="locateAndAdd()">📍 My Location</button>
  <button id="addspot-btn" onclick="openAddPanel()">➕ Add Spot</button>
  <button id="toggle-btn" onclick="toggleSidebar()">☰</button>
</div>

<div id="map" class="split"></div>

<div id="side">
  <div id="side-head">
    <h2>🌍 PFA – Parking For All</h2>
    <span id="cnt">Loading…</span>
  </div>

  <div id="tree">
    <div id="tsec-conf">
      <div class="tsec-hdr" onclick="tToggle('conf')">
        <span class="tcar" id="tc-conf">&#9658;</span>
        <span>&#9989; Confirmed</span>
        <span class="tbg" id="tb-conf">0</span>
      </div>
      <div class="tsec-body" id="tb-conf-body"></div>
    </div>
    <div id="tsec-unconf">
      <div class="tsec-hdr" onclick="tToggle('unconf')">
        <span class="tcar" id="tc-unconf">&#9658;</span>
        <span>&#10067; Unconfirmed</span>
        <span class="tbg" id="tb-unconf">0</span>
      </div>
      <div class="tsec-body" id="tb-unconf-body"></div>
    </div>
  </div>

  <div id="list-hint">
    <div style="font-size:32px">🅿️</div>
    <div><b style="color:#555">Browse spots above</b></div>
    <div style="font-size:12px;color:#aaa">Click a spot name in the tree<br>to view its full details</div>
  </div>
  <div id="list"></div>

  <div id="quick-add">
    <div id="qa-title">📍 Add a PFA spot here?</div>
    <div id="qa-addr-display"></div>
    <textarea id="qa-notes" placeholder="Describe the free parking… (e.g. Free 2hr Mon–Fri, unlimited Sundays)&#10;Press Enter to save instantly!"></textarea>
    <div id="qa-btns">
      <button id="qa-save" onclick="quickSave()">✅ Save This Spot</button>
      <button id="qa-cancel" onclick="closeQuickAdd()">✕ Cancel</button>
    </div>
  </div>
</div>

<button id="locbtn" onclick="locate()">📍</button>
<div id="toast"></div>

<div id="add-overlay">
  <div id="add-overlay-hdr">
    <span id="add-overlay-hdr-title">➕ Add Free Parking Spot</span>
    <button onclick="closeAddPanel()" style="margin-left:auto;background:rgba(255,255,255,.2);border:none;color:white;border-radius:50%;width:26px;height:26px;font-size:15px;cursor:pointer;line-height:1;">✕</button>
  </div>
  <div id="add-overlay-body">
    <div class="add-step-label">Step 1 — Enter the parking address:</div>
    <div id="add-search-row">
      <input id="add-input" placeholder="e.g. 8 Claremont St, South Yarra"
        style="flex:1;padding:9px 12px;border:1.5px solid #1976d2;border-radius:8px;font-size:13px;outline:none;min-width:0;"
        onkeydown="if(event.key==='Enter')searchAddSpot()"/>
      <button onclick="searchAddSpot()"
        style="padding:9px 14px;background:#1976d2;color:white;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;">Search</button>
    </div>
    <div id="add-status"></div>
    <div id="add-addr-box"></div>
    <div class="add-step-label" id="add-step2-label" style="display:none;">Step 2 — Describe the free parking:</div>
    <textarea id="add-desc" rows="4" placeholder="e.g. Free after 6pm, 2hr limit daytime, no ticket needed"></textarea>
    <button id="add-save-btn" onclick="saveAddSpot()">📍 Save Free Parking Spot</button>
  </div>
</div>

<div id="sync-indicator"><div id="sync-ring"></div><div id="sync-dot"></div><span id="sync-label">Syncing…</span></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ══════════════════════════════════════════════════════════════════════════
//  PFA — all data now lives in SQLite via Flask API
// ══════════════════════════════════════════════════════════════════════════

const NEED_OK  = 3;   // confirmations needed
const NEED_REM = 3;   // disputes before removal

// Per-browser anonymous UID stored in localStorage
let uid = localStorage.getItem('uid') || ('u' + Math.random().toString(36).slice(2, 8));
localStorage.setItem('uid', uid);

// In-memory mirror of spots (refreshed from API)
let spots = [];
let mks   = {};       // leaflet markers keyed by spot id
let smk   = null;     // search pin
let myLocMarker = null, myAccCircle = null;
let sidebarVisible = true;

// Pending state for quick-add / add-panel
let pending   = {lat:null,lng:null,fullAddr:'',c:'',co:'',cc:'',state:'',city:'',suburb:''};
let addPnd    = {lat:null,lng:null,addr:'',c:'',co:'',cc:'',state:'',city:'',suburb:''};
let addMk     = null;
let editingId = null;  // spot id being edited (null = new)

let tSelectedId = null;
let tSecOpen    = {conf:false, unconf:false};
let tCCOpen     = {};
let tStOpen     = {};
let tCityOpen   = {};
let tSubOpen    = {};

// ── Toast ─────────────────────────────────────────────────────────────────
let tt;
function toast(m){
  const el=document.getElementById('toast');
  el.textContent=m; el.classList.add('on');
  clearTimeout(tt); tt=setTimeout(()=>el.classList.remove('on'),2700);
}

// ── Flag emoji helper ─────────────────────────────────────────────────────
function fl(cc){
  var c=(cc||'').toLowerCase();
  if(!c)return '';
  var img=document.createElement('img');
  img.src='https://flagcdn.com/16x12/'+c+'.png';
  img.width=16;img.height=12;img.alt=c.toUpperCase();
  img.style.cssText='vertical-align:middle;margin-right:3px;border-radius:1px';
  img.onerror=function(){this.style.display='none';};
  return img.outerHTML;
}

// ── Map setup ─────────────────────────────────────────────────────────────
const map = L.map('map').setView([20,10],2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);

const gi=L.divIcon({html:'<div style="background:#43a047;width:14px;height:14px;border-radius:50%;border:3px solid white;box-shadow:0 1px 4px rgba(0,0,0,.5)"></div>',iconSize:[14,14],iconAnchor:[7,7],popupAnchor:[0,-9],className:''});
const oi=L.divIcon({html:'<div style="background:#fb8c00;width:14px;height:14px;border-radius:50%;border:3px solid white;box-shadow:0 1px 4px rgba(0,0,0,.5)"></div>',iconSize:[14,14],iconAnchor:[7,7],popupAnchor:[0,-9],className:''});
const ri=L.divIcon({html:'<div style="background:#e53935;width:14px;height:14px;border-radius:50%;border:3px solid white;box-shadow:0 1px 4px rgba(0,0,0,.5)"></div>',iconSize:[14,14],iconAnchor:[7,7],popupAnchor:[0,-9],className:''});
const pi=L.divIcon({html:'<div style="background:#8e24aa;width:18px;height:18px;border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,.6)"></div>',iconSize:[18,18],iconAnchor:[9,9],popupAnchor:[0,-11],className:''});
const greenIcon=gi;

// ── API helpers ───────────────────────────────────────────────────────────
async function apiFetch(path, opts){
  const res = await fetch(path, opts);
  if(!res.ok){
    const body = await res.text();
    const err = new Error(body);
    err.status = res.status;
    throw err;
  }
  return res.json();
}

async function loadSpots(){
  try{
    spots = await apiFetch('/api/spots?uid='+encodeURIComponent(uid));
    // Re-draw all markers
    Object.values(mks).forEach(m=>map.removeLayer(m));
    mks={};
    spots.forEach(putMk);
    buildTree();
    render();
  }catch(e){
    toast('❌ Failed to load spots.');
  }
}

// ── Marker helpers ────────────────────────────────────────────────────────
function ts(s){
  if(s.dn>=NEED_REM) return 'bad';
  if(NEED_REM>1 && s.dn>=Math.ceil(NEED_REM*.6)) return 'warn';
  if(s.up>=NEED_OK) return 'ok';
  return 'neu';
}
function ico(s){const t=ts(s);return t==='bad'?ri:t==='warn'?oi:gi;}
function ppop(s){
  return `<b>${fl(s.cc)} ${s.a}</b><br><small>${s.c}, ${s.co}</small>${s.n?'<br><i>'+s.n+'</i>':''}<br><small>✅${s.up} ❌${s.dn}</small>`;
}

function putMk(s){
  if(mks[s.id]) map.removeLayer(mks[s.id]);
  const m=L.marker([s.lat,s.lng],{icon:ico(s)}).addTo(map).bindPopup(ppop(s));
  m.on('click',function(){
    tGoSpot(s.id, null);
    openTreeToSpot(s);
  });
  mks[s.id]=m;
}

// ── Trust bar ─────────────────────────────────────────────────────────────
function thtml(s){
  const tot=Math.max(s.up+s.dn,1), pct=Math.round(s.up/tot*100), t=ts(s);
  let col='#888', msg='';
  if(t==='bad'){col='#e53935';msg='🚨 Removed on next not-free vote!';}
  else if(t==='warn'){col='#fb8c00';msg='⚠️ '+(NEED_REM-s.dn)+' more removes this spot';}
  else if(t==='ok'){col='#2e7d32';msg='✅ Confirmed free by community!';}
  else msg='❓ Unconfirmed · '+s.up+'/'+NEED_OK+' confirmation needed';
  return `<div class="tbar"><div class="tfill" style="width:${pct}%;background:${col}"></div></div><div class="tmsg" style="color:${col}">${msg}</div>`;
}

// ── Sidebar toggle ─────────────────────────────────────────────────────────
function toggleSidebar(){
  sidebarVisible=!sidebarVisible;
  const side=document.getElementById('side');
  const mapEl=document.getElementById('map');
  const btn=document.getElementById('toggle-btn');
  const locbtn=document.getElementById('locbtn');
  if(sidebarVisible){
    side.classList.remove('hidden');
    mapEl.classList.remove('full'); mapEl.classList.add('split');
    btn.textContent='☰ Hide';
    locbtn.classList.remove('sidebar-hidden');
  } else {
    side.classList.add('hidden');
    mapEl.classList.remove('split'); mapEl.classList.add('full');
    btn.textContent='☰ Show';
    locbtn.classList.add('sidebar-hidden');
  }
  setTimeout(()=>map.invalidateSize(),320);
}

// ── Locate (view only) ───────────────────────────────────────────────────
function locate(){
  if(!navigator.geolocation){toast('Geolocation not supported.');return;}
  toast('📍 Getting your location…');
  navigator.geolocation.getCurrentPosition(p=>{
    const lat=p.coords.latitude,lng=p.coords.longitude,acc=Math.round(p.coords.accuracy);
    if(myLocMarker){map.removeLayer(myLocMarker);myLocMarker=null;}
    if(myAccCircle){map.removeLayer(myAccCircle);myAccCircle=null;}
    const myIcon=L.divIcon({html:`<div style="width:18px;height:18px;border-radius:50%;background:#2196f3;border:3px solid white;animation:pulse 1.8s infinite;"></div>`,iconSize:[18,18],iconAnchor:[9,9],className:''});
    myAccCircle=L.circle([lat,lng],{radius:acc,color:'#2196f3',weight:1,fillColor:'#2196f3',fillOpacity:0.1}).addTo(map);
    myLocMarker=L.marker([lat,lng],{icon:myIcon,zIndexOffset:1000}).addTo(map)
      .bindPopup(`<b>📍 You are here</b><br><small>${lat.toFixed(6)}, ${lng.toFixed(6)}</small><br><small>Accuracy: ±${acc}m</small>`).openPopup();
    map.flyTo([lat,lng],acc<50?18:acc<200?16:14,{duration:1.4});
    toast('✅ Located! Accuracy: ±'+acc+'m');
  }, err=>{
    const msgs={1:'Location denied.',2:'Location unavailable.',3:'Timed out.'};
    toast('❌ '+(msgs[err.code]||'Could not get location.'));

// ── Vote ──────────────────────────────────────────────────────────────────
async function vote(id,v,e){
  e.stopPropagation();
  const s=spots.find(x=>x.id===id); if(!s)return;
  if(s.my_vote!==0){toast('You already voted on this spot.');return;}
  try{
    const res=await apiFetch('/api/spots/'+id+'/vote',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({uid,vote:v})
    });
    if(res.removed){
      toast('🗑️ Removed — community said not free.');
      if(mks[id]){map.removeLayer(mks[id]);delete mks[id];}
      spots=spots.filter(x=>x.id!==id);
      buildTree();render();return;
    }
    const idx=spots.findIndex(x=>x.id===id);
    if(idx>=0) spots[idx]=res;
    if(v===1) toast(res.up>=NEED_OK?'✅ Confirmed free by community!':'👍 '+res.up+'/'+NEED_OK+' confirmations.');
    else toast('👎 Reported. '+(NEED_REM-res.dn)+' more removes it.');
    putMk(res);
    if(mks[res.id]) mks[res.id].setPopupContent(ppop(res));
    render();
  }catch(err){
    const msg=err.message;
    if(msg&&msg.includes('Already voted')) toast('You already voted on this spot.');
    else toast('❌ Vote failed.');
  }
}

// ── Request deletion (confirmed spots) ───────────────────────────────────
async function requestDelete(id,e){
  e.stopPropagation();
  const s=spots.find(x=>x.id===id); if(!s)return;
  if(s.my_delete_vote){toast('You already requested deletion of this spot.');return;}
  const dvCount=(s.delete_votes||[]).length;
  const remaining=3-dvCount-1;
  if(!confirm(`Request deletion of this spot?\n\n${dvCount+1}/3 votes — ${remaining>0?remaining+' more vote'+(remaining!==1?'s':'')+' needed to delete.':'this will delete the spot immediately.'}`))return;
  try{
    const res=await apiFetch('/api/spots/'+id+'/delete-vote',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({uid})
    });
    if(res.removed){
      toast('🗑️ Spot deleted by community vote.');
      if(mks[id]){map.removeLayer(mks[id]);delete mks[id];}
      spots=spots.filter(x=>x.id!==id);
      if(tSelectedId===id) tSelectedId=null;
      buildTree();render();return;
    }
    const idx=spots.findIndex(x=>x.id===id);
    if(idx>=0) spots[idx]=res;
    const cnt=(res.delete_votes||[]).length;
    toast('🗑️ Deletion requested. '+cnt+'/3 votes.');
    render();
  }catch(err){
    const msg=err.message||'';
    if(msg.includes('Already voted')) toast('You already requested deletion of this spot.');
    else toast('❌ Failed to submit deletion request.');
  }
}

// ── Tree ──────────────────────────────────────────────────────────────────
function getParts(s){
  let state=s.state||'',city=s.city||'',suburb=s.suburb||'';
  if(!state||!city){
    const parts=(s.c||'').split(',').map(x=>x.trim()).filter(x=>x&&!/^\d+$/.test(x));
    if(!suburb) suburb=parts[0]||'—';
    if(!city)   city=parts.length>1?parts[1]:parts[0]||suburb;
    if(!state)  state=parts.length>1?parts[parts.length-1]:suburb;
  }
  return{state,city,suburb};
}

function tToggle(sec){
  const was=tSecOpen[sec];
  tSecOpen.conf=false;tSecOpen.unconf=false;tCCOpen={};tStOpen={};
  if(!was){tSecOpen[sec]=true;}
  tSelectedId=null;buildTree();render();
}

function tPickCC(sec,cc,e){if(e)e.stopPropagation();const key=sec+'|'+cc;const was=!!tCCOpen[key];Object.keys(tCCOpen).forEach(k=>{if(k.startsWith(sec+'|'))delete tCCOpen[k];});Object.keys(tStOpen).forEach(k=>{if(k.startsWith(sec+'|'+cc+'|'))delete tStOpen[k];});if(!was)tCCOpen[key]=true;tSelectedId=null;buildTree();render();}
function tPickSt(sec,cc,st,e){if(e)e.stopPropagation();const key=sec+'|'+cc+'|'+st;const was=!!tStOpen[key];Object.keys(tStOpen).forEach(k=>{if(k.startsWith(sec+'|'+cc+'|'))delete tStOpen[k];});if(!was)tStOpen[key]=true;tSelectedId=null;buildTree();render();}
function tPickCity(sec,cc,st,ct,e){if(e)e.stopPropagation();const key=sec+'|'+cc+'|'+st+'|'+ct;const was=!!tCityOpen[key];Object.keys(tCityOpen).forEach(k=>{if(k.startsWith(sec+'|'+cc+'|'+st+'|'))delete tCityOpen[k];});Object.keys(tSubOpen).forEach(k=>{if(k.startsWith(sec+'|'+cc+'|'+st+'|'+ct+'|'))delete tSubOpen[k];});if(!was)tCityOpen[key]=true;tSelectedId=null;buildTree();render();}
function tPickSub2(sec,cc,st,ct,sub,e){if(e)e.stopPropagation();const key=sec+'|'+cc+'|'+st+'|'+ct+'|'+sub;const was=!!tSubOpen[key];Object.keys(tSubOpen).forEach(k=>{if(k.startsWith(sec+'|'+cc+'|'+st+'|'+ct+'|'))delete tSubOpen[k];});if(!was)tSubOpen[key]=true;tSelectedId=null;buildTree();render();}

function tGoSpot(id,e){

  },50);

function openTreeToSpot(s){
  const p=getParts(s);
  const confirmed=s.up>=NEED_OK;
  const sec=confirmed?'conf':'unconf';
  tSecOpen[sec]=true;
  tCCOpen[sec+'|'+s.cc]=true;
  tStOpen[sec+'|'+s.cc+'|'+p.state]=true;
  tCityOpen[sec+'|'+s.cc+'|'+p.state+'|'+p.city]=true;
  tSubOpen[sec+'|'+s.cc+'|'+p.state+'|'+p.city+'|'+p.suburb]=true;
  buildTree();
}

function buildSecBody(sec,list){
  const body=document.getElementById('tb-'+sec+'-body');
  body.innerHTML='';
  const byCC={};
  list.forEach(s=>{const cc=s.cc||'?';if(!byCC[cc])byCC[cc]=[];byCC[cc].push(s);});
  Object.keys(byCC).sort().forEach(cc=>{
    const ccs=byCC[cc];
    const ckey=sec+'|'+cc;
    const ccIsOpen=!!tCCOpen[ckey];
    const ccRow=document.createElement('div');ccRow.className='tcc-row';
    const car=document.createElement('span');car.className='tcar'+(ccIsOpen?' open':'');car.innerHTML='&#9658;';ccRow.appendChild(car);
    const fg=document.createElement('span');fg.innerHTML=fl(cc);ccRow.appendChild(fg);
    const nm=document.createElement('span');nm.textContent=cc;ccRow.appendChild(nm);
    const bg=document.createElement('span');bg.className='tbg';bg.textContent=ccs.length;ccRow.appendChild(bg);
    ccRow.onclick=e=>tPickCC(sec,cc,e);
    body.appendChild(ccRow);
    const stList=document.createElement('div');stList.className='tst-list'+(ccIsOpen?' open':'');
    const byState={};
    ccs.forEach(s=>{const p=getParts(s);const st=p.state||'Unknown';if(!byState[st])byState[st]=[];byState[st].push(s);});
    Object.keys(byState).sort().forEach(st=>{
      const sts=byState[st];
      const stkey=sec+'|'+cc+'|'+st;
      const stIsOpen=!!tStOpen[stkey];
      const stRow=document.createElement('div');stRow.className='tst-row';
      const sc=document.createElement('span');sc.className='tcar'+(stIsOpen?' open':'');sc.innerHTML='&#9658;';stRow.appendChild(sc);
      const sn=document.createElement('span');sn.textContent=st;stRow.appendChild(sn);
      const sb=document.createElement('span');sb.className='tbg';sb.textContent=sts.length;stRow.appendChild(sb);
      stRow.onclick=e=>tPickSt(sec,cc,st,e);
      stList.appendChild(stRow);
      const cityListEl=document.createElement('div');cityListEl.className='tsub-list'+(stIsOpen?' open':'');
      const byCity={};
      sts.forEach(s=>{const p=getParts(s);const ct=p.city||p.suburb||'Unknown';if(!byCity[ct])byCity[ct]=[];byCity[ct].push(s);});
      Object.keys(byCity).sort().forEach(ct=>{
        const cts=byCity[ct];
        const ctkey=sec+'|'+cc+'|'+st+'|'+ct;
        const ctIsOpen=!!tCityOpen[ctkey];
        const ctRow=document.createElement('div');ctRow.className='tsub-row'+(ctIsOpen?' tsub-open':'');
        const ctc=document.createElement('span');ctc.className='tcar'+(ctIsOpen?' open':'');ctc.innerHTML='&#9658;';ctRow.appendChild(ctc);
        const ctn=document.createElement('span');ctn.textContent=ct;ctRow.appendChild(ctn);
        const ctb=document.createElement('span');ctb.className='tbg';ctb.textContent=cts.length;ctRow.appendChild(ctb);
        ctRow.onclick=e=>tPickCity(sec,cc,st,ct,e);
        cityListEl.appendChild(ctRow);
        const suburbListEl=document.createElement('div');suburbListEl.className='tspot-list'+(ctIsOpen?' open':'');
        const bySuburb={};
        cts.forEach(s=>{const p=getParts(s);const sb2=p.suburb||ct;if(!bySuburb[sb2])bySuburb[sb2]=[];bySuburb[sb2].push(s);});
        Object.keys(bySuburb).sort().forEach(sub=>{
          const subs=bySuburb[sub];
          const subkey=sec+'|'+cc+'|'+st+'|'+ct+'|'+sub;
          const subIsOpen=!!tSubOpen[subkey];
          const subRow=document.createElement('div');subRow.className='tspot-row';subRow.style.paddingLeft='76px';
          const subc2=document.createElement('span');subc2.className='tcar'+(subIsOpen?' open':'');subc2.innerHTML='&#9658;';subRow.appendChild(subc2);
          const subn=document.createElement('span');subn.textContent=sub;subRow.appendChild(subn);
          const subb=document.createElement('span');subb.className='tbg';subb.textContent=subs.length;subRow.appendChild(subb);
          subRow.onclick=e=>tPickSub2(sec,cc,st,ct,sub,e);
          suburbListEl.appendChild(subRow);
          const spotListEl=document.createElement('div');spotListEl.className='tspot-list'+(subIsOpen?' open':'');
          subs.forEach(s=>{
            const spRow=document.createElement('div');spRow.className='tspot-row';spRow.style.paddingLeft='90px';spRow.style.borderLeft='3px solid #bbdefb';spRow.style.background='#f8fbff';
            spRow.textContent='📍 '+s.a;spRow.title=s.a+(s.n?' — '+s.n:'');
            spRow.onclick=e=>tGoSpot(s.id,e);
            spotListEl.appendChild(spRow);
          });
          suburbListEl.appendChild(spotListEl);
        });
        cityListEl.appendChild(suburbListEl);
      });
      stList.appendChild(cityListEl);
    });
    body.appendChild(stList);
  });
}

function buildTree(){
  const conf=spots.filter(s=>s.up>=NEED_OK);
  const unconf=spots.filter(s=>s.up<NEED_OK);
  document.getElementById('tb-conf').textContent=conf.length;
  document.getElementById('tb-unconf').textContent=unconf.length;
  ['conf','unconf'].forEach(sec=>{
    const open=tSecOpen[sec];
    document.getElementById('tb-'+sec+'-body').className='tsec-body'+(open?' open':'');
    document.getElementById('tc-'+sec).className='tcar'+(open?' open':'');
  });
  buildSecBody('conf',conf);
  buildSecBody('unconf',unconf);
}

// ── Render spot cards ──────────────────────────────────────────────────────
function render(){
  const el=document.getElementById('list');
  const hint=document.getElementById('list-hint');
  document.getElementById('cnt').textContent=spots.length+' spot'+(spots.length!==1?'s':'');
  const shown=tSelectedId===null?[]:spots.filter(s=>s.id===tSelectedId);
  el.style.display=tSelectedId!==null?'block':'none';
  if(hint) hint.style.display=tSelectedId===null?'flex':'none';
  el.innerHTML='';
  if(!shown.length&&tSelectedId!==null){el.innerHTML='<p style="text-align:center;color:#aaa;padding:20px;font-size:13px">No PFA spots match this filter.</p>';return;}
  [...shown].sort((a,b)=>(b.up-b.dn)-(a.up-a.dn)).forEach(s=>{
    const myUp=s.uv&&s.uv.includes(uid), myDn=s.dv&&s.dv.includes(uid), myV=myUp||myDn;
    const confirmed=s.up>=NEED_OK;
    const d=document.createElement('div');
    d.className='card';d.id='c'+s.id;
    d.style.borderLeft=confirmed?'4px solid #43a047':'4px solid #bdbdbd';
    d.innerHTML=`
      <b>${fl(s.cc)} ${s.a}</b>
      <small>${s.c}${s.co?', '+s.co:''} ${confirmed
        ?'<span style="background:#e8f5e9;color:#2e7d32;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700;margin-left:4px">✅ Confirmed</span>'
        :'<span style="background:#f5f5f5;color:#888;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700;margin-left:4px">❓ Unconfirmed</span>'}</small>
      ${s.n?`<em>${s.n}</em>`:''}
      ${confirmed?'':thtml(s)}
      ${confirmed?'':'<div style="font-size:11px;color:#777;margin-bottom:6px">✅ <b>'+s.up+'</b> confirmed &nbsp; ❌ <b>'+s.dn+'</b> disputed</div>'}
      ${confirmed?'':
        `<div class="vrow">
          <button class="vbtn vyes${myUp?' chosen':''}" ${myV?'disabled':''} onclick="vote(${s.id},1,event)">✅ Still free${myUp?' ✔':''}</button>
          <button class="vbtn vno${myDn?' chosen':''}"  ${myV?'disabled':''} onclick="vote(${s.id},-1,event)">❌ Not free${myDn?' ✔':''}</button>
        </div>`
      }
      ${confirmed?(()=>{
        const dvCount=(s.delete_votes||[]).length;
        const myDV=s.my_delete_vote;
        return `<div style="font-size:11px;color:#888;margin-bottom:6px;display:flex;align-items:center;gap:6px;">
          <span>🗑️ Deletion requests: <b>${dvCount}</b>/3</span>
          ${dvCount>0?'<div style="flex:1;background:#eee;border-radius:4px;height:5px;overflow:hidden;"><div style="width:'+Math.round(dvCount/3*100)+'%;height:100%;background:#e53935;border-radius:4px;"></div></div>':''}
        </div>
        <button class="vbtn vno${myDV?' chosen':''}" style="margin-bottom:6px;" ${myDV?'disabled':''} onclick="requestDelete(${s.id},event)">🗑️ Request Deletion${myDV?' ✔':' ('+dvCount+'/3)'}</button>`;
      })():''}
      <div class="arow">
        <button class="abtn aedit" onclick="startEdit(${s.id},event)">✏️ Edit</button>
        ${!confirmed?`<button class="abtn adel" onclick="del(${s.id},event)">🗑️ Delete</button>`:''}
        ${myV&&!confirmed?'<span style="font-size:10px;color:#aaa;margin-left:auto">✔ Voted</span>':''}
      </div>`;
    d.onclick=e=>{if(e.target.tagName!=='BUTTON'){map.flyTo([s.lat,s.lng],17,{duration:1.1});if(mks[s.id])mks[s.id].openPopup();}};
    el.appendChild(d);
  });
}

// ── Sync indicator ────────────────────────────────────────────────────────
function showSyncing(){
  const el=document.getElementById('sync-indicator');
  const lb=document.getElementById('sync-label');
  el.className='syncing';
  lb.textContent='Refreshing…';
}
function showSynced(){
  const el=document.getElementById('sync-indicator');
  const lb=document.getElementById('sync-label');
  const now=new Date();
  const hh=String(now.getHours()).padStart(2,'0');
  const mm=String(now.getMinutes()).padStart(2,'0');
  const ss=String(now.getSeconds()).padStart(2,'0');
  el.className='synced';
  lb.textContent='Updated '+hh+':'+mm+':'+ss;
  clearTimeout(el._fadeTimer);
  el._fadeTimer=setTimeout(()=>{
    el.className='';
    lb.textContent='Next sync in 30s';
  }, 2500);
}
function showSyncError(){
  const el=document.getElementById('sync-indicator');
  const lb=document.getElementById('sync-label');
  el.className='';
  el.style.borderColor='#e53935';el.style.color='#c62828';
  lb.textContent='Sync failed';
  setTimeout(()=>{el.style.borderColor='';el.style.color='';lb.textContent='Next sync in 30s';},3000);
}

// ── Wrap loadSpots to show indicator ──────────────────────────────────────
const _origLoadSpots = loadSpots;
loadSpots = async function(){
  showSyncing();
  try{
    await _origLoadSpots();
    showSynced();
  }catch(e){
    showSyncError();
  }
};

// ── Boot ───────────────────────────────────────────────────────────────────
loadSpots();
setInterval(loadSpots, 30000);
</script>
