<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Free Parking AU</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { box-sizing: border-box; }

    #topbar {
      position: fixed; top: 0; left: 0; right: 0; height: 48px;
      background: #1a1a2e; color: white;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; z-index: 2000;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    #topbar h1 { font-size: 17px; }
    #topbar span { font-size: 12px; background: #2196f3; padding: 4px 10px; border-radius: 12px; }

    /* Map fills entire viewport below topbar */
    #map {
      position: fixed;
      top: 48px; left: 0;
      width: 100%;
      height: calc(100% - 48px);
      z-index: 1;
    }

    /* Sidebar overlays the right side of the map */
    #sidebar {
      position: fixed;
      top: 48px; right: 0;
      width: 340px;
      height: calc(100% - 48px);
      background: white;
      display: flex; flex-direction: column;
      box-shadow: -3px 0 16px rgba(0,0,0,0.15);
      z-index: 1000;
      overflow: hidden;
    }
    #sidebar-header {
      padding: 12px 16px;
      background: #f8f8f8;
      border-bottom: 1px solid #eee;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    #sidebar-header h2 { font-size: 14px; color: #333; }
    #spot-count { font-size: 12px; color: #2196f3; font-weight: 600; }

    #spot-list { flex: 1; overflow-y: auto; padding: 8px; }

    .spot-card {
      background: white; border: 1px solid #eee; border-radius: 12px;
      padding: 12px; margin-bottom: 8px; cursor: pointer;
      transition: box-shadow .2s, border-color .2s;
    }
    .spot-card:hover { box-shadow: 0 2px 12px rgba(33,150,243,.15); border-color: #2196f3; }
    .spot-card.active { border-color: #2196f3; box-shadow: 0 2px 12px rgba(33,150,243,.25); }
    .spot-card.warning { border-color: #ff9800; background: #fffde7; }
    .spot-card.danger  { border-color: #f44336; background: #fff3f3; }

    .spot-addr  { font-weight: 700; font-size: 14px; color: #1a1a1a; margin-bottom: 2px; }
    .spot-meta  { font-size: 11px; color: #888; margin-bottom: 4px; }
    .spot-notes { font-size: 12px; color: #555; font-style: italic; margin-bottom: 8px; }

    .trust-bar-wrap { margin-bottom: 8px; }
    .trust-label {
      font-size: 10px; color: #777; margin-bottom: 3px;
      display: flex; justify-content: space-between;
    }
    .trust-track { background: #eee; border-radius: 6px; height: 6px; overflow: hidden; }
    .trust-fill  { height: 100%; border-radius: 6px; transition: width .4s; }
    .trust-fill.green  { background: #4caf50; }
    .trust-fill.orange { background: #ff9800; }
    .trust-fill.red    { background: #f44336; }
    .trust-alert { font-size: 10px; margin-top: 3px; font-weight: 600; }

    .vote-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .btn-still {
      flex:1; background:#e8f5e9; color:#2e7d32; border:1px solid #a5d6a7;
      border-radius:20px; padding:5px 8px; font-size:11px; font-weight:600; cursor:pointer;
    }
    .btn-still:hover:not(:disabled) { background:#c8e6c9; }
    .btn-still:disabled { opacity:.4; cursor:not-allowed; }
    .btn-not {
      flex:1; background:#ffebee; color:#c62828; border:1px solid #ef9a9a;
      border-radius:20px; padding:5px 8px; font-size:11px; font-weight:600; cursor:pointer;
    }
    .btn-not:hover:not(:disabled) { background:#ffcdd2; }
    .btn-not:disabled { opacity:.4; cursor:not-allowed; }
    .btn-edit {
      background:#fff3e0; color:#e65100; border:1px solid #ffcc80;
      border-radius:20px; padding:5px 10px; font-size:11px; font-weight:600; cursor:pointer;
    }
    .btn-edit:hover { background:#ffe0b2; }
    .btn-delete {
      background:#fce4ec; color:#880e4f; border:1px solid #f48fb1;
      border-radius:20px; padding:5px 10px; font-size:11px; font-weight:600; cursor:pointer;
    }
    .btn-delete:hover { background:#f8bbd0; }
    .voted-badge { font-size:10px; color:#9e9e9e; font-style:italic; margin-top:4px; }

    /* Add/Edit panel */
    #add-panel {
      padding: 14px 16px; background: #e3f2fd;
      border-top: 2px solid #2196f3; flex-shrink: 0;
    }
    #panel-title { font-size:13px; color:#1565c0; font-weight:700; margin-bottom:10px; }
    #add-panel input, #add-panel textarea {
      width:100%; border:1px solid #ccc; border-radius:8px;
      padding:8px 10px; font-size:13px; margin-bottom:7px; outline:none;
      transition:border-color .2s; background:white;
    }
    #add-panel input:focus, #add-panel textarea:focus { border-color:#2196f3; }
    #add-panel textarea { height:52px; resize:none; }
    #geocode-status { font-size:11px; margin-bottom:6px; min-height:16px; }
    .status-ok      { color:#2e7d32; }
    .status-err     { color:#c62828; }
    .status-loading { color:#1565c0; }
    #btn-row { display:flex; gap:8px; }
    .btn-save {
      flex:1; background:#2196f3; color:white; border:none;
      border-radius:20px; padding:9px; font-size:13px; font-weight:700; cursor:pointer;
    }
    .btn-save:hover { background:#1976d2; }
    .btn-save:disabled { background:#90caf9; cursor:not-allowed; }
    .btn-cancel-panel {
      flex:1; background:#eee; color:#333; border:none;
      border-radius:20px; padding:9px; font-size:13px; font-weight:700; cursor:pointer;
    }
    .btn-cancel-panel:hover { background:#ddd; }

    /* Toast */
    #toast {
      position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
      background:#323232; color:white; padding:10px 22px; border-radius:24px;
      font-size:13px; z-index:9999; opacity:0; transition:opacity .3s;
      pointer-events:none; white-space:nowrap; max-width:90vw;
      text-align:center;
    }
    #toast.show { opacity:1; }

    /* Leaflet pin divs */
    .green-pin  { background:#4caf50; width:18px; height:18px; border-radius:50%; border:3px solid white; box-shadow:0 1px 4px rgba(0,0,0,.4); }
    .orange-pin { background:#ff9800; width:18px; height:18px; border-radius:50%; border:3px solid white; box-shadow:0 1px 4px rgba(0,0,0,.4); }

    /* Mobile */
    @media (max-width: 700px) {
      #sidebar { width:100%; top:auto; bottom:0; height:52vh; box-shadow:0 -3px 16px rgba(0,0,0,.15); }
      #map { height: calc(48vh); top:48px; }
    }
  </style>
</head>
<body>

<div id="topbar">
  <h1>🅿️ Free Parking AU</h1>
  <span id="spot-count-top">8 spots</span>
</div>

<div id="map"></div>

<div id="sidebar">
  <div id="sidebar-header">
    <h2>📍 Free Parking Spots</h2>
    <span id="spot-count">8 spots</span>
  </div>
  <div id="spot-list"></div>
  <div id="add-panel">
    <div id="panel-title">➕ Add a free parking spot</div>
    <input id="inp-addr"   placeholder="Street address (e.g. 123 Swanston St)" autocomplete="off"/>
    <input id="inp-suburb" placeholder="Suburb (e.g. Melbourne CBD)" autocomplete="off"/>
    <input id="inp-state"  placeholder="State (e.g. VIC)" maxlength="3" style="text-transform:uppercase" autocomplete="off"/>
    <textarea id="inp-notes" placeholder="Notes (e.g. Free 2hr, no limit after 6pm)"></textarea>
    <div id="geocode-status"></div>
    <div id="btn-row">
      <button class="btn-save" id="btn-save" onclick="saveSpot()">📍 Save Spot</button>
      <button class="btn-cancel-panel" id="btn-cancel" onclick="cancelEdit()" style="display:none">Cancel</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const CONFIRM_THRESHOLD = 10;
const REMOVE_THRESHOLD  = 10;

function getSessionId(){
  let id=localStorage.getItem('fp_sid');
  if(!id){id='u_'+Math.random().toString(36).slice(2,10);localStorage.setItem('fp_sid',id);}
  return id;
}
const MY_ID = getSessionId();

let spots = [
  {id:1,lat:-37.8136,lng:144.9631,address:"Swanston St near Flinders Lane",suburb:"Melbourne CBD",state:"VIC",notes:"Free after 7pm, 2hr limit daytime",up:8,down:2,upVoters:[],downVoters:[]},
  {id:2,lat:-37.8077,lng:144.9568,address:"Elizabeth St near Queen Victoria Market",suburb:"Melbourne CBD",state:"VIC",notes:"Free on Sundays all day",up:6,down:1,upVoters:[],downVoters:[]},
  {id:3,lat:-37.8150,lng:144.9733,address:"Spring St near Treasury Gardens",suburb:"East Melbourne",state:"VIC",notes:"Free 2hr Mon–Fri, unlimited weekends",up:5,down:0,upVoters:[],downVoters:[]},
  {id:4,lat:-33.8708,lng:151.2073,address:"George St near Sydney Town Hall",suburb:"Sydney CBD",state:"NSW",notes:"Free evenings after 6pm",up:7,down:3,upVoters:[],downVoters:[]},
  {id:5,lat:-33.8740,lng:151.2060,address:"Pitt St near Hyde Park",suburb:"Sydney CBD",state:"NSW",notes:"1hr free limit, check signs",up:5,down:1,upVoters:[],downVoters:[]},
  {id:6,lat:-27.4698,lng:153.0251,address:"Queen St near King George Square",suburb:"Brisbane CBD",state:"QLD",notes:"Free all day Sunday",up:7,down:0,upVoters:[],downVoters:[]},
  {id:7,lat:-31.9530,lng:115.8605,address:"Hay St near Forrest Chase",suburb:"Perth CBD",state:"WA",notes:"Free after 6pm weekdays",up:4,down:1,upVoters:[],downVoters:[]},
  {id:8,lat:-34.9285,lng:138.6007,address:"Rundle Mall near Gawler Place",suburb:"Adelaide CBD",state:"SA",notes:"Free 2hr in surrounding streets",up:3,down:0,upVoters:[],downVoters:[]},
];
let nextId=100, markers={}, editingId=null, activeCard=null;

// ── MAP — the key fix: invalidateSize after DOM settles ────────────────
const map = L.map('map', {zoomControl: true}).setView([-28.5, 134.0], 4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 19
}).addTo(map);

// Force Leaflet to recalculate map size after full page load
window.addEventListener('load', () => {
  setTimeout(() => map.invalidateSize(), 200);
});
window.addEventListener('resize', () => map.invalidateSize());

const mkIcon = cls => L.divIcon({html:`<div class="${cls}"></div>`,iconSize:[18,18],iconAnchor:[9,9],popupAnchor:[0,-12],className:''});
const greenIcon  = mkIcon('green-pin');
const orangeIcon = mkIcon('orange-pin');

let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
}

function trustStatus(s){
  if(s.down>=REMOVE_THRESHOLD) return 'danger';
  if(s.down>=REMOVE_THRESHOLD*0.6) return 'warning';
  if(s.up>=CONFIRM_THRESHOLD) return 'confirmed';
  return 'normal';
}

function trustBarHTML(s){
  const total=(s.up||0)+(s.down||0);
  const upPct=total>0?Math.round((s.up/total)*100):50;
  const ts=trustStatus(s);
  const left=REMOVE_THRESHOLD-(s.down||0);
  let fillClass='green', alertMsg='', alertColor='#555';
  if(ts==='warning'){fillClass='orange';alertColor='#e65100';alertMsg='⚠️ '+left+' more "Not free" vote'+(left===1?'':'s')+' will remove this spot';}
  if(ts==='danger') {fillClass='red';  alertColor='#c62828';alertMsg='🚨 Spot will be removed on next vote!';}
  if(ts==='confirmed'){alertColor='#2e7d32';alertMsg='✅ Community confirmed as free!';}
  if(ts==='normal'&&(s.up||0)<CONFIRM_THRESHOLD) alertMsg=`👍 ${s.up||0}/${CONFIRM_THRESHOLD} confirmations · 👎 ${s.down||0}/${REMOVE_THRESHOLD} disputes`;
  return `<div class="trust-bar-wrap">
    <div class="trust-label"><span>Community trust</span><span>${s.up||0} ✅ · ${s.down||0} ❌</span></div>
    <div class="trust-track"><div class="trust-fill ${fillClass}" style="width:${upPct}%"></div></div>
    ${alertMsg?`<div class="trust-alert" style="color:${alertColor}">${alertMsg}</div>`:''}
  </div>`;
}

function renderList(){
  const list=document.getElementById('spot-list');
  const cnt=spots.length+' spot'+(spots.length!==1?'s':'');
  document.getElementById('spot-count').textContent=cnt;
  document.getElementById('spot-count-top').textContent=cnt;
  list.innerHTML='';
  [...spots].sort((a,b)=>((b.up||0)-(b.down||0))-((a.up||0)-(a.down||0))).forEach(s=>{
    const ts=trustStatus(s);
    const myVoted=(s.upVoters||[]).includes(MY_ID)||(s.downVoters||[]).includes(MY_ID);
    const div=document.createElement('div');
    div.className='spot-card'+(activeCard===s.id?' active':'')+(ts==='warning'?' warning':ts==='danger'?' danger':'');
    div.id='card-'+s.id;
    div.innerHTML=`
      <div class="spot-addr">${s.address}</div>
      <div class="spot-meta">${s.suburb}, ${s.state}</div>
      ${s.notes?`<div class="spot-notes">${s.notes}</div>`:''}
      ${trustBarHTML(s)}
      <div class="vote-row">
        <button class="btn-still" onclick="vote(${s.id},1,event)" ${myVoted?'disabled':''}>✅ Still free</button>
        <button class="btn-not"   onclick="vote(${s.id},-1,event)" ${myVoted?'disabled':''}>❌ Not free</button>
        <button class="btn-edit"  onclick="startEdit(${s.id},event)">✏️</button>
        <button class="btn-delete" onclick="deleteSpot(${s.id},event)">🗑️</button>
      </div>
      ${myVoted?'<div class="voted-badge">You already voted on this spot</div>':''}`;
    div.onclick=(e)=>{if(e.target.tagName==='BUTTON')return;flyTo(s);};
    list.appendChild(div);
  });
}

function popupHTML(s){
  const ts=trustStatus(s);
  const badge=ts==='confirmed'?'✅ Confirmed':ts==='warning'?'⚠️ Under review':ts==='danger'?'🚨 Flagged':'';
  return `<div class="popup-title">${s.address}</div>
    <div class="popup-meta">${s.suburb}, ${s.state}</div>
    ${s.notes?`<div class="popup-notes">${s.notes}</div>`:''}
    <div style="margin-top:5px;font-size:11px;color:#555">👍 ${s.up||0} · 👎 ${s.down||0}</div>
    ${badge?`<div style="margin-top:4px;font-size:11px;font-weight:600">${badge}</div>`:''}`;
}

function addMarker(s){
  if(markers[s.id]) map.removeLayer(markers[s.id]);
  const icon=trustStatus(s)==='warning'||trustStatus(s)==='danger'?orangeIcon:greenIcon;
  const m=L.marker([s.lat,s.lng],{icon}).addTo(map).bindPopup(popupHTML(s));
  m.on('click',()=>{
    activeCard=s.id; renderList();
    document.getElementById('card-'+s.id)?.scrollIntoView({behavior:'smooth',block:'nearest'});
  });
  markers[s.id]=m;
}

function flyTo(s){
  map.flyTo([s.lat,s.lng],17,{duration:1.2});
  markers[s.id]?.openPopup();
  activeCard=s.id; renderList();
}

function vote(id,v,e){
  e.stopPropagation();
  const s=spots.find(x=>x.id===id); if(!s) return;
  if((s.upVoters||[]).includes(MY_ID)||(s.downVoters||[]).includes(MY_ID)){showToast("You've already voted on this spot.");return;}
  if(v===1){
    s.up=(s.up||0)+1; s.upVoters.push(MY_ID);
    showToast(s.up>=CONFIRM_THRESHOLD?'✅ Spot confirmed as free by community!':'👍 Thanks! '+s.up+'/'+CONFIRM_THRESHOLD+' confirmations.');
  } else {
    s.down=(s.down||0)+1; s.downVoters.push(MY_ID);
    if(s.down>=REMOVE_THRESHOLD){
      showToast('🗑️ Removed — '+s.down+' users reported it as no longer free.');
      map.removeLayer(markers[s.id]); delete markers[s.id];
      spots=spots.filter(x=>x.id!==id);
      if(activeCard===id) activeCard=null;
      renderList(); return;
    }
    const left=REMOVE_THRESHOLD-s.down;
    showToast('👎 Reported. '+left+' more report'+(left===1?'':'s')+' will remove this spot.');
  }
  addMarker(s); markers[s.id]?.setPopupContent(popupHTML(s));
  renderList();
}

function deleteSpot(id,e){
  e.stopPropagation();
  if(!confirm('Delete this parking spot?'))return;
  map.removeLayer(markers[id]); delete markers[id];
  spots=spots.filter(s=>s.id!==id);
  if(activeCard===id) activeCard=null;
  renderList(); showToast('🗑️ Spot deleted.');
}

function startEdit(id,e){
  e.stopPropagation();
  const s=spots.find(x=>x.id===id); if(!s) return;
  editingId=id;
  document.getElementById('inp-addr').value=s.address;
  document.getElementById('inp-suburb').value=s.suburb;
  document.getElementById('inp-state').value=s.state;
  document.getElementById('inp-notes').value=s.notes||'';
  document.getElementById('panel-title').textContent='✏️ Edit parking spot';
  document.getElementById('btn-cancel').style.display='block';
  document.getElementById('btn-save').textContent='💾 Update Spot';
  setStatus('Editing — change address to re-geocode.','status-loading');
  document.getElementById('add-panel').scrollIntoView({behavior:'smooth'});
}

function cancelEdit(){
  editingId=null;
  ['inp-addr','inp-suburb','inp-state','inp-notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('panel-title').textContent='➕ Add a free parking spot';
  document.getElementById('btn-cancel').style.display='none';
  document.getElementById('btn-save').textContent='📍 Save Spot';
  setStatus('','');
}

function setStatus(msg,cls){
  const el=document.getElementById('geocode-status');
  el.textContent=msg; el.className=cls;
}

async function geocodeAddress(addr,suburb,state){
  const q=[addr,suburb,state,'Australia'].filter(Boolean).join(', ');
  const url='https://nominatim.openstreetmap.org/search?format=json&limit=1&q='+encodeURIComponent(q);
  const res=await fetch(url,{headers:{'Accept-Language':'en'}});
  const data=await res.json();
  if(data&&data.length>0) return {lat:parseFloat(data[0].lat),lng:parseFloat(data[0].lon),display:data[0].display_name};
  return null;
}

async function saveSpot(){
  const addr  =document.getElementById('inp-addr').value.trim();
  const suburb=document.getElementById('inp-suburb').value.trim();
  const state =document.getElementById('inp-state').value.trim().toUpperCase();
  const notes =document.getElementById('inp-notes').value.trim();
  if(!addr||!suburb||!state){alert('Please fill in address, suburb, and state.');return;}
  setStatus('🔍 Looking up address…','status-loading');
  document.getElementById('btn-save').disabled=true;
  const geo=await geocodeAddress(addr,suburb,state);
  document.getElementById('btn-save').disabled=false;
  if(!geo){setStatus('❌ Address not found. Try adding a street number.','status-err');return;}
  setStatus('✅ Found: '+geo.display.split(',').slice(0,3).join(','),'status-ok');
  if(editingId){
    const s=spots.find(x=>x.id===editingId);
    if(s){Object.assign(s,{address:addr,suburb,state,notes,lat:geo.lat,lng:geo.lng});addMarker(s);}
    map.flyTo([geo.lat,geo.lng],17,{duration:1.2});
    cancelEdit(); showToast('✏️ Spot updated!');
  } else {
    const s={id:nextId++,lat:geo.lat,lng:geo.lng,address:addr,suburb,state,notes,up:0,down:0,upVoters:[],downVoters:[]};
    spots.push(s); addMarker(s);
    map.flyTo([geo.lat,geo.lng],17,{duration:1.2});
    setTimeout(()=>markers[s.id]?.openPopup(),1300);
    activeCard=s.id;
    ['inp-addr','inp-suburb','inp-state','inp-notes'].forEach(i=>document.getElementById(i).value='');
    setTimeout(()=>setStatus('',''),3000);
    showToast('📍 Spot added! Thanks for contributing.');
  }
  renderList();
}

document.addEventListener('keydown',e=>{if(e.key==='Enter'&&e.target.tagName==='INPUT')saveSpot();});
spots.forEach(addMarker);
renderList();
</script>
</body>
</html>
